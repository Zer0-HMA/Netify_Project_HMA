<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NEÓN ARCADE | Sistema Central</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff00ff; --cyan: #00ffff; --dark: #050111; }
        body { background: var(--dark); color: white; font-family: 'Orbitron', sans-serif; }
        .cyber-card { background: rgba(10, 5, 30, 0.9); border: 1px solid var(--pink); box-shadow: 0 0 15px rgba(255, 0, 255, 0.2); backdrop-filter: blur(10px); }
        .btn-cyber { background: linear-gradient(45deg, var(--pink), var(--cyan)); clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%); font-weight: bold; transition: 0.3s; }
        .neon-text { text-shadow: 0 0 10px var(--cyan); }
        .hidden { display: none !important; }
        input { background: rgba(0,0,0,0.5); border-bottom: 2px solid var(--cyan); padding: 10px; outline: none; color: var(--cyan); width: 100%; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 z-[9999] flex items-center justify-center bg-black">
        <div class="p-10 cyber-card w-full max-w-md text-center">
            <h1 class="audiowide text-2xl mb-8 neon-text">SISTEMA DE ACCESO</h1>
            <input type="text" id="username" placeholder="OPERADOR_ID">
            <input type="password" id="password" placeholder="PASSWORD_ENCRIPTADA">
            <div class="flex gap-4">
                <button onclick="login()" class="btn-cyber flex-1 py-3">ENTRAR</button>
                <button onclick="register()" class="btn-cyber flex-1 py-3" style="background: #111; border: 1px solid var(--pink);">REGISTRAR</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden min-h-screen">
        <header class="p-6 border-b border-cyan-900 flex justify-between items-center bg-black/80">
            <div class="audiowide text-xl neon-text">NEÓN ARCADE</div>
            <div class="flex items-center gap-4">
                <span id="user-display" class="text-xs text-pink-500"></span>
                <button onclick="logout()" class="text-[10px] border border-red-500 px-2 py-1 hover:bg-red-500">SALIR</button>
            </div>
        </header>

        <main class="p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="cyber-card p-6 h-fit">
                <h3 class="audiowide text-sm mb-6 neon-text" id="form-title">NUEVO PRODUCTO</h3>
                <input type="hidden" id="edit-id">
                <input type="text" id="prod-name" placeholder="Nombre">
                <input type="number" id="prod-price" placeholder="Precio">
                <button onclick="saveProduct()" id="btn-save" class="btn-cyber w-full py-3">AÑADIR A RED</button>
                <button onclick="cancelEdit()" id="btn-cancel" class="hidden w-full mt-2 text-[10px] text-gray-400 underline">Cancelar Edición</button>
            </div>

            <div class="lg:col-span-2">
                <div id="product-list" class="grid grid-cols-1 gap-4"></div>
            </div>
        </main>
    </div>

    <script>
        // --- USUARIOS ---
        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const users = JSON.parse(localStorage.getItem('usuarios') || '{}');
            if(users[u] && users[u] === p) {
                localStorage.setItem('currentUser', u);
                checkSession();
            } else { alert("Error de acceso"); }
        }

        function register() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(!u || !p) return alert("Completa los campos");
            const users = JSON.parse(localStorage.getItem('usuarios') || '{}');
            users[u] = p;
            localStorage.setItem('usuarios', JSON.stringify(users));
            alert("Usuario registrado. Ahora puedes entrar.");
        }

        function logout() { localStorage.removeItem('currentUser'); location.reload(); }

        // --- CRUD DE PRODUCTOS ---
        function saveProduct() {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;
            if(!name || !price) return;

            let prods = JSON.parse(localStorage.getItem('global_prods') || '[]');
            
            if(id) { // UPDATE
                prods = prods.map(p => p.id == id ? {id, name, price} : p);
                cancelEdit();
            } else { // CREATE
                prods.push({ id: Date.now(), name, price });
            }
            
            localStorage.setItem('global_prods', JSON.stringify(prods));
            render();
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-price').value = '';
        }

        function render() {
            const list = document.getElementById('product-list');
            const prods = JSON.parse(localStorage.getItem('global_prods') || '[]');
            list.innerHTML = prods.map(p => `
                <div class="cyber-card p-4 flex justify-between items-center border-cyan-800">
                    <div>
                        <p class="neon-text font-bold">${p.name}</p>
                        <p class="text-xs text-pink-400">$${p.price}</p>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="startEdit(${p.id}, '${p.name}', ${p.price})" class="text-[10px] text-cyan-400 hover:underline">EDITAR</button>
                        <button onclick="deleteProd(${p.id})" class="text-[10px] text-red-500 hover:underline">BORRAR</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteProd(id) {
            let prods = JSON.parse(localStorage.getItem('global_prods') || '[]');
            prods = prods.filter(p => p.id != id);
            localStorage.setItem('global_prods', JSON.stringify(prods));
            render();
        }

        function startEdit(id, name, price) {
            document.getElementById('edit-id').value = id;
            document.getElementById('prod-name').value = name;
            document.getElementById('prod-price').value = price;
            document.getElementById('form-title').innerText = "EDITAR MÓDULO";
            document.getElementById('btn-save').innerText = "ACTUALIZAR DATOS";
            document.getElementById('btn-cancel').classList.remove('hidden');
        }

        function cancelEdit() {
            document.getElementById('edit-id').value = '';
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-price').value = '';
            document.getElementById('form-title').innerText = "NUEVO PRODUCTO";
            document.getElementById('btn-save').innerText = "AÑADIR A RED";
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        function checkSession() {
            const user = localStorage.getItem('currentUser');
            if(user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('user-display').innerText = `OPERADOR: ${user}`;
                render();
            }
        }

        checkSession();
    </script>
</body>
</html>
