<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEÓN ARCADE | Seguridad Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff00ff;
            --cyan: #00ffff;
            --dark: #050111;
        }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(255, 0, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .neon-text { text-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan); }
        .neon-pink { text-shadow: 0 0 10px var(--pink), 0 0 20px var(--pink); }

        .cyber-card {
            background: rgba(10, 5, 30, 0.8);
            border: 1px solid var(--pink);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .cyber-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
            border-color: var(--cyan);
        }

        /* Botón estilo Retro-Futurista */
        .btn-glitch {
            background: linear-gradient(45deg, var(--pink), var(--cyan));
            border: none;
            color: white;
            position: relative;
            overflow: hidden;
            transition: 0.2s;
            font-weight: bold;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }

        .btn-glitch:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        .hidden { display: none !important; }

        /* Animación de escaneo */
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        .scanner {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 255, 255, 0.2);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="scanner"></div>

    <div id="login-screen" class="fixed inset-0 z-[9999] flex items-center justify-center bg-black">
        <div class="p-10 cyber-card rounded-none border-t-4 border-b-4 w-full max-w-md text-center">
            <h1 class="audiowide text-3xl mb-2 neon-text tracking-widest">ACCESO AL NODO</h1>
            <p class="text-[10px] text-pink-500 mb-8 tracking-[0.5em]">SISTEMA DE SEGURIDAD ENCRIPTADO</p>
            
            <div class="space-y-6">
                <div class="relative">
                    <input type="text" id="user" placeholder="OPERADOR_ID" class="w-full bg-black/50 border-l-4 border-cyan-500 p-3 outline-none text-cyan-400 placeholder-cyan-900">
                </div>
                <div class="relative">
                    <input type="password" id="pass" placeholder="CLAVE_ACCESO" class="w-full bg-black/50 border-l-4 border-pink-500 p-3 outline-none text-pink-400 placeholder-pink-900">
                </div>
                <button onclick="handleLogin()" class="btn-glitch w-full py-4 text-sm tracking-widest">INICIAR_BOOT</button>
            </div>
            <p class="mt-6 text-[9px] text-gray-600">admin / 123</p>
        </div>
    </div>

    <div id="app" class="hidden min-h-screen flex flex-col">
        <header class="p-6 border-b border-cyan-900 bg-black/80 flex justify-between items-center">
            <div class="audiowide text-2xl neon-text">NEÓN<span class="neon-pink">ARCADE</span></div>
            <div class="flex items-center gap-6">
                <span class="text-[10px] text-cyan-500 audiowide animate-pulse">ESTADO: CONECTADO</span>
                <button onclick="handleLogout()" class="text-[10px] border border-red-500 px-2 py-1 hover:bg-red-500 transition">DESCONECTAR</button>
            </div>
        </header>

        <main class="p-8 grid grid-cols-1 xl:grid-cols-4 gap-8">
            <div class="xl:col-span-3">
                <h2 class="audiowide text-lg mb-8 neon-text underline decoration-pink-500">MÓDULOS_DISPONIBLES</h2>
                <div id="lista-productos" class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-6">
                    </div>
            </div>

            <aside class="space-y-6">
                <div class="cyber-card p-6 sticky top-24">
                    <h3 class="audiowide text-sm mb-6 border-b border-pink-500 pb-2">COLA_DE_DESPLIEGUE</h3>
                    <div id="items-carrito" class="space-y-4 mb-6 max-h-[40vh] overflow-y-auto">
                        </div>
                    <div class="border-t border-cyan-900 pt-4">
                        <div class="flex justify-between audiowide text-sm">
                            <span>TOTAL:</span>
                            <span id="total-precio" class="neon-text">$0</span>
                        </div>
                        <button onclick="finalizarCompra()" class="btn-glitch w-full py-3 mt-6 text-xs">EJECUTAR_CONTRATO</button>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script>
        // PRODUCTOS EN ESPAÑOL
        const productos = [
            { id: 1, name: "Núcleo IA Sentinel", price: 25000, img: "", desc: "IA de defensa autónoma v4.2" },
            { id: 2, name: "Firewall Cuántico", price: 18800, img: "", desc: "Bloqueo perimetral grado militar" },
            { id: 3, name: "Escáner de Intrusos", price: 7600, img: "", desc: "Detección de malware en tiempo real" },
            { id: 4, name: "Nodo de Red Privada", price: 4300, img: "", desc: "Encriptación de punto a punto" },
            { id: 5, name: "Inyector de Código", price: 11900, img: "", desc: "Módulo de recuperación de datos" },
            { id: 6, name: "Sonda Stealth v8", price: 34000, img: "", desc: "Vigilancia de red invisible" }
        ];

        let carrito = JSON.parse(localStorage.getItem('user_cart')) || [];

        function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === 'admin' && p === '123') {
                localStorage.setItem('auth_status', 'active');
                init();
            } else { alert("ACCESO DENEGADO"); }
        }

        function handleLogout() {
            localStorage.removeItem('auth_status');
            location.reload();
        }

        function init() {
            if(localStorage.getItem('auth_status')) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                render();
            }
        }

        function render() {
            const grid = document.getElementById('lista-productos');
            grid.innerHTML = productos.map(p => `
                <div class="cyber-card p-6 flex flex-col justify-between">
                    <div>
                        <div class="text-5xl mb-4">${p.img}</div>
                        <h4 class="audiowide text-sm neon-text mb-2">${p.name}</h4>
                        <p class="text-[10px] text-gray-400 mb-6">${p.desc}</p>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-pink-500">$${p.price.toLocaleString()}</span>
                        <button onclick="addToCart(${p.id})" class="btn-glitch px-4 py-2 text-[10px]">ADQUIRIR</button>
                    </div>
                </div>
            `).join('');
            updateCart();
        }

        function addToCart(id) {
            const p = productos.find(x => x.id === id);
            carrito.push(p);
            localStorage.setItem('user_cart', JSON.stringify(carrito));
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('items-carrito');
            const totalDisplay = document.getElementById('total-precio');
            
            list.innerHTML = carrito.map((item, idx) => `
                <div class="flex justify-between text-[10px] bg-white/5 p-2 border-r-2 border-cyan-500">
                    <span>${item.name}</span>
                    <span class="text-pink-400">$${item.price}</span>
                </div>
            `).join('');

            const total = carrito.reduce((s, i) => s + i.price, 0);
            totalDisplay.innerText = `$${total.toLocaleString()}`;
        }

        function finalizarCompra() {
            if(carrito.length === 0) return alert("COLA VACÍA");
            alert("CONTRATO EJECUTADO: Recursos asignados a su IP.");
            carrito = [];
            localStorage.removeItem('user_cart');
            updateCart();
        }

        init();
    </script>
</body>
</html>
