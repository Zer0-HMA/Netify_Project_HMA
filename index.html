<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON ARCADE | Future Tech Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Syncopate:wght@400;700&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --synth-pink: #ff00ff;
            --synth-cyan: #00ffff;
            --synth-purple: #3a006f;
            --dark-bg: #050111;
            --grid-color: rgba(255, 0, 255, 0.1);
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Exo 2', sans-serif;
            overflow-x: hidden;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            /* Degradado de fondo retro */
            background-attachment: fixed;
        }

        .audiowide { font-family: 'Audiowide', cursive; }
        .syncopate { font-family: 'Syncopate', sans-serif; }

        /* --- EFECTOS RETROWAVE --- */
        .neon-text-pink {
            color: var(--synth-pink);
            text-shadow: 0 0 5px var(--synth-pink), 0 0 10px var(--synth-pink);
        }
        .neon-text-cyan {
            color: var(--synth-cyan);
            text-shadow: 0 0 5px var(--synth-cyan), 0 0 10px var(--synth-cyan);
        }

        .neon-border-pink {
            border: 2px solid var(--synth-pink);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5), inset 0 0 15px rgba(255, 0, 255, 0.3);
        }
        .neon-border-cyan {
            border: 2px solid var(--synth-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5), inset 0 0 15px rgba(0, 255, 255, 0.3);
        }

        /* --- ANIMACIONES --- */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: 0%; }
        }

        /* Línea de escaneo animada */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(255, 0, 255, 0.2);
            opacity: 0.5;
            animation: scanline 6s linear infinite;
            pointer-events: none;
            z-index: 999;
        }

        .card-float {
            transition: all 0.3s ease;
        }
        .card-float:hover {
            animation: float 2s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.4);
            border-color: var(--synth-cyan);
        }

        /* Botón estilo Arcade */
        .btn-arcade {
            background: linear-gradient(180deg, var(--synth-pink) 0%, #a000a0 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-shadow: 0 2px 2px rgba(0,0,0,0.5);
            box-shadow: 0 5px 0 #5e005e, 0 8px 15px rgba(255,0,255,0.3);
        }

        .btn-arcade:hover {
            background: linear-gradient(180deg, #ff40ff 0%, var(--synth-pink) 100%);
            transform: translateY(2px);
            box-shadow: 0 3px 0 #5e005e, 0 5px 10px rgba(255,0,255,0.3);
        }

        .btn-arcade:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        .hidden { display: none !important; }

        /* Scrollbar Vaporwave */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--synth-pink), var(--synth-cyan)); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 z-[10000] flex items-center justify-center bg-[#050111]">
        <div class="absolute inset-0 opacity-20" style="background: linear-gradient(180deg, #3a006f 0%, #050111 100%);"></div>
        
        <div class="p-10 neon-border-cyan bg-black/80 max-w-lg w-full text-center relative card-float">
            <h1 class="syncopate text-4xl mb-3 neon-text-pink font-bold">SYSTEM ACCESS</h1>
            <p class="audiowide text-xs tracking-[0.4em] mb-10 text-cyan-200">RETROWAVE SECURITY PROTOCOL v1.98</p>
            <div class="space-y-5">
                <input type="text" id="user" placeholder="SYS_OPERATOR" class="w-full bg-transparent border-b-2 border-pink-900 p-3 outline-none focus:border-cyan-400 text-cyan-300 audiowide text-center">
                <input type="password" id="pass" placeholder="ACCESS_KEY" class="w-full bg-transparent border-b-2 border-pink-900 p-3 outline-none focus:border-cyan-400 text-cyan-300 audiowide text-center">
                <button onclick="handleLogin()" class="btn-arcade w-full py-4 syncopate text-lg">BOOT SEQUENCE</button>
            </div>
            <p class="mt-5 text-[10px] text-gray-700 italic">Credentials: admin / 123</p>
        </div>
    </div>

    <div id="app" class="hidden min-h-screen flex flex-col">
        <header class="border-b-2 border-pink-900 p-5 flex justify-between items-center bg-black/60 backdrop-blur-md sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <span class="text-3xl neon-text-pink">🕹️</span>
                <span class="syncopate font-black text-2xl tracking-tighter neon-text-cyan">NEON<span class="neon-text-pink">ARCADE</span></span>
            </div>
            <div class="flex items-center gap-8">
                <span id="op-status" class="audiowide text-xs neon-text-pink">LINK_STATUS: <span class="neon-text-cyan">ACTIVE</span></span>
                <button onclick="handleLogout()" class="audiowide text-xs hover:text-red-400 transition">LOGOUT</button>
            </div>
        </header>

        <section class="relative h-[45vh] overflow-hidden flex items-center justify-center border-b-2 border-pink-900">
            <div class="absolute inset-0 opacity-30 pointer-events-none" style="background: radial-gradient(circle at center, #8a2be2 0%, #050111 70%);"></div>
            <div class="text-center z-10 px-6">
                <p class="audiowide text-xs tracking-[0.6em] text-cyan-300 mb-3 animate-pulse">BIENVENIDO A LA ARCOLOGÍA DIGITAL</p>
                <h2 class="syncopate text-7xl font-black mb-6 neon-text-pink">THE ARCADE</h2>
                <div class="flex gap-5 justify-center">
                    <button class="btn-arcade px-10 py-3 text-sm syncopate">VER_MÓDULOS</button>
                    <button class="btn-arcade px-10 py-3 text-sm syncopate" style="background: linear-gradient(180deg, var(--synth-cyan) 0%, #00a0a0 100%); box-shadow: 0 5px 0 #005e5e;">SUBIR_MODS</button>
                </div>
            </div>
        </section>

        <main class="flex-grow p-8 grid grid-cols-1 xl:grid-cols-4 gap-10">
            <div class="xl:col-span-3">
                <h3 class="audiowide text-lg mb-8 flex items-center gap-3 neon-text-cyan">
                    <span class="w-3 h-3 bg-cyan-500 rounded-full animate-pulse"></span> CATÁLOGO_RETROFUTURISTA
                </h3>
                <div id="lista-productos" class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-8">
                    </div>
            </div>

            <aside class="relative">
                <div class="sticky top-28 neon-border-cyan p-8 bg-purple-950/20 backdrop-blur-lg rounded-xl">
                    <h3 class="syncopate text-md mb-8 text-center border-b-2 border-pink-900 pb-3 neon-text-pink">QUEUE_DESPLIEGUE</h3>
                    <div id="items-carrito" class="space-y-5 mb-8 max-h-[45vh] overflow-y-auto pr-3">
                        </div>
                    <div class="border-t-2 border-pink-900 pt-6 space-y-3">
                        <div class="flex justify-between text-xs audiowide">
                            <span>TOTAL_CREDITS</span>
                            <span id="total-precio" class="neon-text-cyan text-lg font-bold">$0</span>
                        </div>
                        <div class="flex justify-between text-[10px] text-gray-500 uppercase">
                            <span>Digital_Tax</span>
                            <span>3.14%</span>
                        </div>
                        <button onclick="finalizarCompra()" class="btn-arcade w-full py-5 mt-6 syncopate text-lg">PROCESAR_COMPRA</button>
                    </div>
                </div>
            </aside>
        </main>

        <footer class="border-t-2 border-pink-900 p-10 grid grid-cols-2 md:grid-cols-4 gap-6 text-center bg-black/30">
            <div><p class="text-3xl audiowide neon-text-cyan">15</p><p class="text-[10px] text-gray-600">MÓDULOS_DB</p></div>
            <div><p class="text-3xl audiowide neon-text-cyan">5</p><p class="text-[10px] text-gray-600">NODOS_RED</p></div>
            <div><p class="text-3xl audiowide neon-text-pink">0</p><p class="text-[10px] text-gray-600">BRECHAS_SEG</p></div>
            <div><p class="text-3xl audiowide neon-text-pink">98%</p><p class="text-[10px] text-gray-600">OPTIMIZADO</p></div>
        </footer>
    </div>

    <script>
        const productos = [
            { id: 1, name: "Neural-Synth Core", price: 25000, img: "🧠", desc: "Interfaz auditiva vaporwave directa." },
            { id: 2, name: "Neon Rider Console", price: 18800, img: "⌨️", desc: "Teclado mecánico holográfico." },
            { id: 3, name: "Arcade-ICE Breaker", price: 7600, img: "👾", desc: "Bypass de seguridad SmartGrid retro." },
            { id: 4, name: "Vapor-Cure Bots", price: 4300, img: "🧴", desc: "Reparación estética nanotecnológica." },
            { id: 5, name: "Croma-Vault Chip", price: 11900, img: "💿", desc: "Almacenamiento de data de alta fidelidad." },
            { id: 6, name: "Synth-Drone v4", price: 28000, img: "🚁", desc: "Vigilancia estética aérea." }
        ];

        let carrito = JSON.parse(localStorage.getItem('arcade_cart')) || [];

        function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === 'admin' && p === '123') {
                localStorage.setItem('arcade_auth', 'true');
                init();
            } else {
                alert("ACCESS_DENIED: Credenciales inválidas.");
            }
        }

        function handleLogout() {
            localStorage.removeItem('arcade_auth');
            location.reload();
        }

        function init() {
            if(localStorage.getItem('arcade_auth')) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                render();
            }
        }

        function render() {
            const grid = document.getElementById('lista-productos');
            grid.innerHTML = productos.map(p => `
                <div class="neon-border-pink p-8 bg-black/60 card-float rounded-lg border-opacity-50 hover:border-opacity-100 flex flex-col justify-between">
                    <div>
                        <div class="text-6xl mb-6 neon-text-cyan flex justify-center">${p.img}</div>
                        <h4 class="syncopate text-xl neon-text-cyan mb-2">${p.name}</h4>
                        <p class="text-xs text-gray-400 mb-6 h-10">${p.desc}</p>
                    </div>
                    <div class="flex justify-between items-center border-t border-pink-900 pt-4">
                        <span class="audiowide font-bold text-lg neon-text-pink">$${p.price.toLocaleString()}</span>
                        <button onclick="addToCart(${p.id})" class="btn-arcade px-6 py-2 text-xs syncopate">AÑADIR</button>
                    </div>
                </div>
            `).join('');
            updateCart();
        }

        function addToCart(id) {
            const p = productos.find(x => x.id === id);
            carrito.push(p);
            localStorage.setItem('arcade_cart', JSON.stringify(carrito));
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('items-carrito');
            const totalDisplay = document.getElementById('total-precio');
            
            list.innerHTML = carrito.map((item, idx) => `
                <div class="flex justify-between text-xs border-r-2 border-cyan-500 pr-3 py-2 bg-cyan-950/10 rounded">
                    <div>
                        <p class="font-bold text-cyan-100">${item.name}</p>
                        <p class="text-[9px] text-pink-600">ID_MOD_${idx + 100}</p>
                    </div>
                    <span class="audiowide neon-text-pink">$${item.price}</span>
                </div>
            `).join('');

            const total = carrito.reduce((s, i) => s + i.price, 0);
            totalDisplay.innerText = `$${total.toLocaleString()}`;
        }

        function finalizarCompra() {
            if(carrito.length === 0) return alert("NO_DATA_TO_PROCESS");
            alert("TRANSACTION_SUCCESS: Módulos desplegados en la red.");
            carrito = [];
            localStorage.removeItem('arcade_cart');
            updateCart();
        }

        init();
    </script>
</body>
</html>
