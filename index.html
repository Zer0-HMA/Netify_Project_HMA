<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIKI-VAULT ULTRA | 50+ Items</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #9d00ff; }
        body { 
            background: #050505; color: #e0e0e0; font-family: 'Rajdhani', sans-serif;
            background-image: radial-gradient(circle at top, #1a1a2e 0%, #050505 100%);
            background-attachment: fixed;
        }
        .audiowide { font-family: 'Audiowide', cursive; }
        .glow-border { border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; }
        .glow-border:hover { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .hidden { display: none !important; }
        input, select, textarea { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 10px; color: white; outline: none; border-radius: 8px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="app" class="min-h-screen flex flex-col">
        <header class="sticky top-0 z-50 bg-black/80 backdrop-blur-lg border-b border-white/10 p-4">
            <div class="container mx-auto flex flex-wrap justify-between items-center gap-4">
                <div class="audiowide text-2xl text-cyan-400 flex items-center gap-2">
                    <i data-lucide="zap"></i> FV-ULTRA
                </div>
                <div class="relative flex-grow max-w-md">
                    <i data-lucide="search" class="absolute left-3 top-2.5 text-gray-500 w-4 h-4"></i>
                    <input type="text" id="search-bar" onkeyup="filtrarTodo()" placeholder="Buscar entre 50+ artículos..." class="w-full pl-10 py-2 rounded-full text-sm">
                </div>
                <nav class="flex gap-4">
                    <button onclick="switchTab('tienda')" class="text-xs font-bold hover:text-cyan-400">TIENDA</button>
                    <button onclick="switchTab('vender')" class="text-xs font-bold hover:text-cyan-400">VENDER</button>
                </nav>
            </div>
        </header>

        <main class="container mx-auto p-6 grid grid-cols-1 lg:grid-cols-4 gap-8">
            <aside class="space-y-6">
                <div class="p-6 glow-border bg-white/5 rounded-2xl">
                    <h3 class="audiowide text-xs mb-4 text-cyan-400 uppercase">Filtrar Categoría</h3>
                    <div class="space-y-3" id="filter-container">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" value="PC Gamer" checked onchange="filtrarTodo()" class="accent-cyan-400"> PC Gamer / Hardware
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" value="Ropa Friki" checked onchange="filtrarTodo()" class="accent-cyan-400"> Ropa Friki
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" value="Juegos" checked onchange="filtrarTodo()" class="accent-cyan-400"> Videojuegos
                        </label>
                    </div>
                </div>

                <div class="p-6 glow-border bg-purple-900/10 rounded-2xl">
                    <h3 class="audiowide text-xs mb-4 flex items-center gap-2"><i data-lucide="shopping-bag"></i> CARRITO</h3>
                    <div id="cart-items" class="text-[10px] space-y-2 mb-4 max-h-60 overflow-y-auto"></div>
                    <div class="border-t border-white/10 pt-4 flex justify-between audiowide text-sm">
                        <span>TOTAL:</span>
                        <span id="cart-total" class="text-cyan-400">$0</span>
                    </div>
                    <button onclick="alert('Pedido enviado a la base de datos')" class="w-full py-3 mt-4 bg-cyan-500 text-black font-bold rounded-lg text-xs uppercase">Confirmar Compra</button>
                </div>
            </aside>

            <div class="lg:col-span-3">
                <section id="tab-tienda" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></section>

                <section id="tab-vender" class="hidden animate__animated animate__fadeIn">
                    <div class="p-8 glow-border bg-white/5 rounded-2xl max-w-2xl mx-auto">
                        <h2 class="audiowide text-xl mb-6 text-center">VENDER ARTÍCULO</h2>
                        <input type="text" id="new-name" placeholder="Nombre del producto" class="w-full mb-4">
                        <input type="number" id="new-price" placeholder="Precio ($)" class="w-full mb-4">
                        <select id="new-cat" class="w-full mb-4">
                            <option value="PC Gamer">PC Gamer</option>
                            <option value="Ropa Friki">Ropa Friki</option>
                            <option value="Juegos">Juegos</option>
                        </select>
                        <div class="border-2 border-dashed border-gray-700 p-6 text-center rounded-xl mb-6 cursor-pointer" onclick="document.getElementById('new-file').click()">
                            <i data-lucide="upload-cloud" class="mx-auto mb-2"></i>
                            <p class="text-xs text-gray-500">Subir imagen desde PC</p>
                            <input type="file" id="new-file" class="hidden" onchange="handleFile(this)">
                        </div>
                        <button onclick="saveNewProduct()" class="w-full py-4 bg-purple-600 rounded-xl font-bold uppercase">Publicar Ahora</button>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        let allProducts = [];
        let cart = [];
        let tempImg = "https://via.placeholder.com/300x200?text=FrikiVault";

        // --- GENERADOR DE 50 ARTÍCULOS ---
        function generateData() {
            const cats = ["PC Gamer", "Ropa Friki", "Juegos"];
            const hardware = ["RTX 5090", "Ryzen 9 9950X", "Monitor OLED 4K", "Teclado Mecánico RGB", "Mouse Inalámbrico", "RAM 64GB DDR5"];
            const clothing = ["Sudadera Naruto", "Playera Zelda", "Gorra Cyberpunk", "Chaqueta Akatsuki", "Calcetines Mario"];
            const games = ["Elden Ring DLC", "GTA VI Pre-order", "Halo Infinite", "Final Fantasy Rebirth", "Cyberpunk 2077"];

            for(let i=1; i<=50; i++) {
                let cat = cats[Math.floor(Math.random()*cats.length)];
                let name = "";
                if(cat === "PC Gamer") name = hardware[Math.floor(Math.random()*hardware.length)] + " #" + i;
                else if(cat === "Ropa Friki") name = clothing[Math.floor(Math.random()*clothing.length)] + " #" + i;
                else name = games[Math.floor(Math.random()*games.length)] + " #" + i;

                allProducts.push({
                    id: i,
                    name: name,
                    price: Math.floor(Math.random() * 20000) + 500,
                    cat: cat,
                    img: `https://picsum.photos/seed/${i+20}/400/300` // Imágenes reales aleatorias
                });
            }
            render(allProducts);
        }

        // --- FILTROS DINÁMICOS ---
        function filtrarTodo() {
            const searchText = document.getElementById('search-bar').value.toLowerCase();
            const checkedCats = Array.from(document.querySelectorAll('#filter-container input:checked')).map(cb => cb.value);
            
            const filtered = allProducts.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(searchText);
                const matchesCat = checkedCats.includes(p.cat);
                return matchesSearch && matchesCat;
            });
            render(filtered);
        }

        function render(products) {
            const container = document.getElementById('tab-tienda');
            container.innerHTML = products.map(p => `
                <div class="glow-border bg-white/5 rounded-2xl overflow-hidden group">
                    <div class="h-44 overflow-hidden"><img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition"></div>
                    <div class="p-4">
                        <span class="text-[9px] text-cyan-400 font-bold uppercase">${p.cat}</span>
                        <h4 class="audiowide text-sm mt-1">${p.name}</h4>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-lg font-bold italic">$${p.price.toLocaleString()}</span>
                            <button onclick="addToCart('${p.name}', ${p.price})" class="bg-white text-black px-3 py-1 rounded-lg hover:bg-cyan-400 transition"><i data-lucide="plus" class="w-4"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- IMAGEN DESDE PC ---
        function handleFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => { tempImg = e.target.result; alert("Imagen cargada en memoria."); };
            reader.readAsDataURL(input.files[0]);
        }

        function saveNewProduct() {
            const n = document.getElementById('new-name').value;
            const p = document.getElementById('new-price').value;
            const c = document.getElementById('new-cat').value;
            if(!n || !p) return;
            allProducts.unshift({ id: Date.now(), name: n, price: Number(p), cat: c, img: tempImg });
            switchTab('tienda');
            filtrarTodo();
        }

        // --- CARRITO ---
        function addToCart(name, price) {
            cart.push({name, price});
            document.getElementById('cart-items').innerHTML = cart.map(i => `<div class="flex justify-between"><span>${i.name}</span><span>$${i.price}</span></div>`).join('');
            document.getElementById('cart-total').innerText = `$${cart.reduce((s,i)=>s+i.price, 0).toLocaleString()}`;
        }

        function switchTab(id) {
            document.getElementById('tab-tienda').classList.add('hidden');
            document.getElementById('tab-vender').classList.add('hidden');
            document.getElementById('tab-' + id).classList.remove('hidden');
        }

        generateData();
    </script>
</body>
</html>
