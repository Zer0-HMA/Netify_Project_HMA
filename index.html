<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUERVO-FRIKI | Marketplace Legendario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #9d00ff; --neon-green: #10b981; }
        body { 
            background: #020204; color: #e0e0e0; font-family: 'Rajdhani', sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #020204 100%);
            background-attachment: fixed;
        }
        .audiowide { font-family: 'Audiowide', cursive; }
        .glass-panel { background: rgba(13, 13, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; }
        .glow-cyan { box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        .hidden { display: none !important; }
        
        input, select { background: rgba(0,0,0,0.6); border: 1px solid #333; padding: 12px; color: white; border-radius: 10px; width: 100%; }
        .btn-primary { background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan)); color: white; font-weight: bold; padding: 12px; border-radius: 10px; transition: 0.3s; text-transform: uppercase; }
        .btn-primary:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* Notificaciones */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .toast { background: #00f2ff; color: black; padding: 12px 24px; border-radius: 8px; font-weight: bold; margin-top: 10px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .avatar-opt { cursor: pointer; border: 2px solid transparent; border-radius: 50%; transition: 0.3s; width: 45px; background: #222; }
        .avatar-selected { border-color: var(--neon-cyan); box-shadow: 0 0 15px var(--neon-cyan); }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="toast-container"></div>

    <div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/95">
        <div class="glass-panel p-10 max-w-md w-full border-t-4 border-cyan-500">
            <div id="login-box">
                <h1 class="audiowide text-4xl mb-2 text-center">CUERVO-<span class="text-cyan-400">FRIKI</span></h1>
                <p class="text-[10px] text-gray-500 mb-8 text-center tracking-[0.5em]">AUTH_REQUIRED</p>
                <div class="space-y-4">
                    <input type="text" id="login-ident" placeholder="Usuario o Correo">
                    <input type="password" id="login-pass" placeholder="Contraseña">
                    <button onclick="login()" class="btn-primary w-full">Ingresar</button>
                    <p class="text-center text-xs mt-4">¿Sin acceso? <a href="#" onclick="toggleAuth()" class="text-cyan-400">Crear Perfil</a></p>
                </div>
            </div>

            <div id="register-box" class="hidden">
                <h1 class="audiowide text-2xl mb-4 text-center">NUEVO <span class="text-purple-500">USER</span></h1>
                <div class="grid grid-cols-4 gap-2 mb-6" id="avatar-selector">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=A" class="avatar-opt avatar-selected" onclick="selectAvatar(this, 'A')">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=B" class="avatar-opt" onclick="selectAvatar(this, 'B')">
                    <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=C" class="avatar-opt" onclick="selectAvatar(this, 'C', 'pixel-art')">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=D" class="avatar-opt" onclick="selectAvatar(this, 'D', 'avataaars')">
                </div>
                <div class="space-y-3">
                    <input type="text" id="reg-user" placeholder="Nombre de Usuario">
                    <input type="email" id="reg-mail" placeholder="Correo">
                    <input type="password" id="reg-pass" placeholder="Contraseña">
                    <button onclick="register()" class="btn-primary w-full">Vincular</button>
                    <p class="text-center text-xs mt-3"><a href="#" onclick="toggleAuth()" class="text-gray-500">Volver</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="app" class="hidden min-h-screen flex flex-col">
        <header class="glass-panel sticky top-0 z-50 rounded-none px-6 py-4 flex justify-between items-center">
            <div class="audiowide text-2xl text-cyan-400" onclick="switchTab('tienda')">CUERVO-FRIKI</div>
            <nav class="flex gap-6 items-center">
                <button onclick="switchTab('tienda')" class="hover:text-cyan-400"><i data-lucide="layout-grid"></i></button>
                <button onclick="switchTab('vender')" class="hover:text-cyan-400"><i data-lucide="plus-square"></i></button>
                <button onclick="switchTab('perfil')" class="flex items-center gap-2">
                    <img id="nav-avatar" src="" class="w-8 h-8 rounded-full border border-purple-500">
                    <span id="nav-user" class="text-xs font-bold hidden sm:block"></span>
                </button>
                <button onclick="logout()" class="text-red-500"><i data-lucide="log-out"></i></button>
            </nav>
        </header>

        <main class="container mx-auto p-6 flex-grow">
            <div id="tab-tienda" class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <aside class="glass-panel p-6 h-fit space-y-6">
                    <div>
                        <h3 class="audiowide text-xs mb-4 text-cyan-400 uppercase">Filtros</h3>
                        <div class="space-y-2 text-sm" id="filter-container">
                            <label class="flex items-center gap-2"><input type="checkbox" value="PC Gamer" checked onchange="filtrar()"> Hardware</label>
                            <label class="flex items-center gap-2"><input type="checkbox" value="Ropa Friki" checked onchange="filtrar()"> Ropa Geek</label>
                        </div>
                    </div>
                    <div class="border-t border-white/5 pt-4">
                        <h3 class="audiowide text-xs mb-3 flex items-center gap-2"><i data-lucide="shopping-bag" class="w-4"></i> Carrito</h3>
                        <div id="cart-list" class="text-xs space-y-2 mb-4 max-h-40 overflow-auto"></div>
                        <div class="flex justify-between font-bold text-cyan-400 mb-4"><span>Total:</span><span id="cart-total">$0</span></div>
                        <button onclick="openCheckout()" class="w-full bg-cyan-500 text-black py-2 rounded-lg font-bold text-xs">PAGAR CAJA</button>
                    </div>
                </aside>
                <div class="lg:col-span-3 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="store-grid"></div>
            </div>

            <div id="tab-vender" class="hidden glass-panel p-8 max-w-xl mx-auto">
                <h2 class="audiowide text-2xl mb-6 text-center text-cyan-400">Vender Artículo</h2>
                <div class="space-y-4">
                    <input type="text" id="new-name" placeholder="¿Qué vendes?">
                    <input type="number" id="new-price" placeholder="Precio MXN">
                    <select id="new-cat">
                        <option value="PC Gamer">PC Gamer</option>
                        <option value="Ropa Friki">Ropa Friki</option>
                    </select>
                    <input type="file" id="new-file" onchange="previewImg(this)" class="text-xs">
                    <button onclick="publish()" class="btn-primary w-full">Subir al Mercado</button>
                </div>
            </div>

            <div id="tab-perfil" class="hidden space-y-8">
                <div class="glass-panel p-8 flex flex-col md:flex-row gap-8 items-center">
                    <img id="dash-avatar" src="" class="w-32 h-32 rounded-full border-4 border-cyan-400">
                    <div class="flex-grow">
                        <h2 class="audiowide text-4xl" id="dash-name"></h2>
                        <p id="dash-mail" class="text-gray-500"></p>
                    </div>
                    <div class="flex gap-4">
                        <div class="text-center p-4 bg-white/5 rounded-xl"><p class="text-xs text-gray-400">VENTAS</p><p class="text-2xl font-bold" id="stat-sales">0</p></div>
                        <div class="text-center p-4 bg-white/5 rounded-xl"><p class="text-xs text-gray-400">GANADO</p><p class="text-2xl font-bold text-green-400" id="stat-rev">$0</p></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <section>
                        <h3 class="audiowide text-xl text-cyan-400 mb-4 flex items-center gap-2"><i data-lucide="package"></i> Mis Ventas Activas</h3>
                        <div id="dash-products" class="space-y-3"></div>
                    </section>
                    <section>
                        <h3 class="audiowide text-xl text-purple-400 mb-4 flex items-center gap-2"><i data-lucide="history"></i> Historial de Compras</h3>
                        <div id="dash-history" class="space-y-3"></div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <div id="checkout-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center bg-black/95 p-4">
        <div class="glass-panel p-8 max-w-sm w-full text-center">
            <i data-lucide="shield-check" class="w-12 h-12 text-cyan-400 mx-auto mb-4"></i>
            <h2 class="audiowide text-xl mb-6">Confirmar Compra</h2>
            <p class="text-3xl font-bold mb-8" id="check-total">$0</p>
            <button onclick="processFinal()" class="btn-primary w-full mb-4">Pagar con Tarjeta (Simulado)</button>
            <button onclick="closeCheckout()" class="text-xs text-gray-500 uppercase tracking-widest">Cancelar</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let user = null;
        let cart = [];
        let tempImg = '';
        let selAv = 'https://api.dicebear.com/7.x/bottts/svg?seed=A';

        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function getDB() { return JSON.parse(localStorage.getItem('cf_db')) || { users: [], products: [], orders: [] }; }
        function saveDB(db) { localStorage.setItem('cf_db', JSON.stringify(db)); }

        function selectAvatar(el, s, t='bottts') {
            document.querySelectorAll('.avatar-opt').forEach(i => i.classList.remove('avatar-selected'));
            el.classList.add('avatar-selected');
            selAv = `https://api.dicebear.com/7.x/${t}/svg?seed=${s}`;
        }

        function toggleAuth() { document.getElementById('login-box').classList.toggle('hidden'); document.getElementById('register-box').classList.toggle('hidden'); }

        function register() {
            const u = document.getElementById('reg-user').value, e = document.getElementById('reg-mail').value, p = document.getElementById('reg-pass').value;
            let db = getDB();
            db.users.push({ u, e, p, avatar: selAv, sales: 0, rev: 0 });
            saveDB(db); showToast("Perfil Creado!"); toggleAuth();
        }

        function login() {
            const i = document.getElementById('login-ident').value, p = document.getElementById('login-pass').value;
            const db = getDB();
            const found = db.users.find(u => (u.u === i || u.e === i) && u.p === p);
            if(found) { user = found; startApp(); } else alert("Error");
        }

        function startApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('nav-avatar').src = user.avatar;
            document.getElementById('nav-user').innerText = user.u;
            filtrar();
        }

        function switchTab(t) {
            ['tienda','vender','perfil'].forEach(x => document.getElementById(`tab-${x}`).classList.add('hidden'));
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            if(t === 'perfil') loadDashboard();
        }

        function renderStore(prods) {
            document.getElementById('store-grid').innerHTML = prods.map(p => `
                <div class="glass-panel overflow-hidden group">
                    <img src="${p.img}" class="h-48 w-full object-cover group-hover:scale-105 transition">
                    <div class="p-4">
                        <div class="flex justify-between text-[10px] text-cyan-400 uppercase mb-2"><span>${p.cat}</span><span>Vendedor: ${p.owner}</span></div>
                        <h4 class="font-bold mb-4">${p.name}</h4>
                        <div class="flex justify-between items-center">
                            <span class="text-xl font-black">$${p.price}</span>
                            <button onclick="addToCart(${p.id})" class="bg-white text-black p-2 rounded-lg hover:bg-cyan-400 transition"><i data-lucide="plus"></i></button>
                        </div>
                        <button onclick="alert('Iniciando chat con ${p.owner}...')" class="text-[10px] mt-4 text-gray-500 hover:text-white flex items-center gap-1"><i data-lucide="message-square" class="w-3"></i> Preguntar al vendedor</button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filtrar() {
            const db = getDB();
            const checks = Array.from(document.querySelectorAll('#filter-container input:checked')).map(c => c.value);
            renderStore(db.products.filter(p => p.status === 'active' && checks.includes(p.cat)));
        }

        function addToCart(id) {
            const p = getDB().products.find(x => x.id === id);
            if(p.owner === user.u) return showToast("Es tu propio item!");
            cart.push(p); updateCart(); showToast("Agregado!");
        }

        function updateCart() {
            document.getElementById('cart-list').innerHTML = cart.map(i => `<div class="flex justify-between"><span>${i.name}</span><span>$${i.price}</span></div>`).join('');
            document.getElementById('cart-total').innerText = `$${cart.reduce((a,b)=>a+b.price,0)}`;
        }

        function openCheckout() {
            if(cart.length === 0) return;
            document.getElementById('check-total').innerText = document.getElementById('cart-total').innerText;
            document.getElementById('checkout-modal').classList.remove('hidden');
        }
        function closeCheckout() { document.getElementById('checkout-modal').classList.add('hidden'); }

        function processFinal() {
            let db = getDB();
            cart.forEach(item => {
                // Marcar vendido
                db.products.find(p => p.id === item.id).status = 'sold';
                // Ganancia vendedor
                let seller = db.users.find(u => u.u === item.owner);
                if(seller) { seller.sales++; seller.rev += item.price; }
                // Registrar orden para el comprador
                db.orders.push({ buyer: user.u, item: item.name, price: item.price, date: new Date().toLocaleDateString(), track: 'CF-'+Math.random().toString(36).substr(2,9).toUpperCase() });
            });
            saveDB(db);
            cart = []; updateCart(); closeCheckout(); filtrar();
            showToast("¡Compra Exitosa!");
            alert("¡PAGO CONFIRMADO!\nTu pedido se ha registrado en tu historial con éxito.");
        }

        function previewImg(input) {
            const reader = new FileReader();
            reader.onload = e => tempImg = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }

        function publish() {
            const n = document.getElementById('new-name').value, p = Number(document.getElementById('new-price').value), c = document.getElementById('new-cat').value;
            let db = getDB();
            db.products.unshift({ id: Date.now(), name: n, price: p, cat: c, img: tempImg, owner: user.u, status: 'active' });
            saveDB(db); showToast("¡Publicado!"); switchTab('tienda'); filtrar();
        }

        function loadDashboard() {
            const db = getDB();
            const uInfo = db.users.find(u => u.u === user.u);
            document.getElementById('dash-avatar').src = uInfo.avatar;
            document.getElementById('dash-name').innerText = uInfo.u;
            document.getElementById('dash-mail').innerText = uInfo.e;
            document.getElementById('stat-sales').innerText = uInfo.sales;
            document.getElementById('stat-rev').innerText = `$${uInfo.rev}`;

            // Mis Ventas
            document.getElementById('dash-products').innerHTML = db.products.filter(p => p.owner === user.u && p.status === 'active').map(p => `
                <div class="bg-white/5 p-3 rounded-lg flex justify-between items-center">
                    <span>${p.name}</span><span class="text-cyan-400 font-bold">$${p.price}</span>
                </div>
            `).join('') || '<p class="text-gray-600">No tienes artículos en venta.</p>';

            // Mis Compras
            document.getElementById('dash-history').innerHTML = db.orders.filter(o => o.buyer === user.u).map(o => `
                <div class="bg-white/5 p-4 rounded-lg border-l-4 border-purple-500">
                    <div class="flex justify-between mb-1"><span class="font-bold text-sm">${o.item}</span><span class="text-purple-400">$${o.price}</span></div>
                    <div class="flex justify-between text-[10px] text-gray-500 uppercase"><span>Rastreo: ${o.track}</span><span>${o.date}</span></div>
                    <div class="mt-2 text-[9px] bg-purple-500/20 text-purple-300 w-fit px-2 py-0.5 rounded">En preparación para envío</div>
                </div>
            `).join('') || '<p class="text-gray-600">Aún no has comprado nada.</p>';
        }

        function logout() { location.reload(); }
        
        // Carga inicial de productos si está vacío
        if(getDB().products.length === 0) {
            let db = getDB();
            db.products.push({id:1, name:"Teclado Neon RGB", price:1200, cat:"PC Gamer", img:"https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?w=400", owner:"Admin", status:"active"});
            db.products.push({id:2, name:"Sudadera Akatsuki", price:850, cat:"Ropa Friki", img:"https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=400", owner:"Admin", status:"active"});
            saveDB(db);
        }
    </script>
</body>
</html>
