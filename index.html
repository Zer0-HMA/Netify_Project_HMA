<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CyberLibre | Redes Inteligentes & Seguridad</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="login-screen" class="overlay">
        <div class="glass-card login-card animate-pop">
            <div class="logo-area">🛡️</div>
            <h2>Security Portal</h2>
            <p>Admin / 123</p>
            <input type="text" id="user" placeholder="Operador">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="handleLogin()" class="btn-primary">Ingresar</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <nav class="navbar">
            <div class="logo">Cyber<span>Libre</span></div>
            <div class="nav-tools">
                <span id="user-display"></span>
                <button onclick="handleLogout()" class="btn-logout">Salir</button>
            </div>
        </nav>

        <main class="container">
            <section class="products-grid" id="lista-productos">
                </section>

            <aside class="sidebar">
                <div class="glass-card cart-container">
                    <h3>Carrito de Despliegue</h3>
                    <div id="items-carrito" class="cart-list"></div>
                    <div class="total-box">
                        <span>Total:</span>
                        <span id="total-precio">$0</span>
                    </div>
                    <button onclick="finalizarCompra()" class="btn-buy">Confirmar Orden</button>
                </div>
            </aside>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
