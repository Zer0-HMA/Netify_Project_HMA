<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo Carrito - Shop Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="login-screen" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-96">
            <h2 class="text-2xl font-bold mb-4 text-center">Bienvenido</h2>
            <p class="text-sm text-gray-600 mb-6 text-center">Usa: <b>admin</b> / <b>123</b></p>
            <input type="text" id="user" placeholder="Usuario" class="w-full p-2 mb-4 border rounded">
            <input type="password" id="pass" placeholder="Contraseña" class="w-full p-2 mb-6 border rounded">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">Entrar</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <nav class="bg-blue-600 p-4 text-white flex justify-between items-center shadow-md">
            <h1 class="text-xl font-bold">🛒 RapidShop Pro</h1>
            <button onclick="handleLogout()" class="bg-red-500 px-3 py-1 rounded text-sm">Cerrar Sesión</button>
        </nav>

        <main class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4" id="lista-productos">
                </div>

            <div class="bg-white p-6 rounded-lg shadow-md h-fit">
                <h2 class="text-xl font-bold mb-4 border-b pb-2">Tu Carrito</h2>
                <div id="items-carrito" class="space-y-3 mb-4">
                    </div>
                <div class="border-t pt-4 font-bold text-lg flex justify-between">
                    <span>Total:</span>
                    <span id="total-precio">$0</span>
                </div>
                <button onclick="finalizarCompra()" class="w-full mt-6 bg-green-500 text-white py-2 rounded hover:bg-green-600">Pagar Ahora</button>
            </div>
        </main>
    </div>

    <script>
        const productos = [
            { id: 1, name: "Tenis Galácticos", price: 1200, img: "👟" },
            { id: 2, name: "Sudadera Hacker", price: 850, img: "🧥" },
            { id: 3, name: "Gorra Prototipo", price: 300, img: "🧢" },
            { id: 4, name: "Reloj Quantum", price: 2500, img: "⌚" },
        ];

        let carrito = JSON.parse(localStorage.getItem('cart')) || [];

        // --- AUTH LOGIC ---
        function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === 'admin' && p === '123') {
                localStorage.setItem('isAuth', 'true');
                checkAuth();
            } else { alert('Datos incorrectos, carnal'); }
        }

        function handleLogout() {
            localStorage.removeItem('isAuth');
            location.reload();
        }

        function checkAuth() {
            if(localStorage.getItem('isAuth')) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                renderAll();
            }
        }

        // --- CARRITO LOGIC ---
        function addToCart(id) {
            const prod = productos.find(p => p.id === id);
            carrito.push(prod);
            localStorage.setItem('cart', JSON.stringify(carrito));
            renderCarrito();
        }

        function renderAll() {
            const container = document.getElementById('lista-productos');
            container.innerHTML = productos.map(p => `
                <div class="bg-white p-4 rounded shadow hover:shadow-lg transition">
                    <div class="text-4xl mb-2">${p.img}</div>
                    <h3 class="font-bold">${p.name}</h3>
                    <p class="text-gray-500">$${p.price}</p>
                    <button onclick="addToCart(${p.id})" class="mt-3 w-full bg-blue-100 text-blue-700 py-1 rounded font-semibold hover:bg-blue-200">Agregar</button>
                </div>
            `).join('');
            renderCarrito();
        }

        function renderCarrito() {
            const cartContainer = document.getElementById('items-carrito');
            const totalElement = document.getElementById('total-precio');
            
            if(carrito.length === 0) {
                cartContainer.innerHTML = '<p class="text-gray-400 text-sm">El carrito está vacío</p>';
            } else {
                cartContainer.innerHTML = carrito.map((item, index) => `
                    <div class="flex justify-between text-sm italic">
                        <span>${item.name}</span>
                        <span class="font-bold">$${item.price}</span>
                    </div>
                `).join('');
            }

            const total = carrito.reduce((acc, item) => acc + item.price, 0);
            totalElement.innerText = `$${total}`;
        }

        function finalizarCompra() {
            alert("¡Compra exitosa! Se vaciará el estado del cliente.");
            carrito = [];
            localStorage.removeItem('cart');
            renderCarrito();
        }

        // Iniciar app
        checkAuth();
    </script>
</body>
</html>
